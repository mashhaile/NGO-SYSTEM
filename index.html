<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Central Command</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3182ce; --success: #38a169; --danger: #e53e3e; --bg: #f0f2f5; }
        .hidden { display: none !important; }
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: var(--bg); color: #1a202c; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select, textarea { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2b6cb0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
        th { background: #edf2f7; padding: 15px; text-align: left; color: #4a5568; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; font-size: 14px; vertical-align: middle; }
        tr:hover { background-color: #f7fafc; }
        .analytics-row { display: flex; gap: 20px; align-items: stretch; margin-bottom: 25px; height: 200px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 12px; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .chart-box { flex: 2; margin-bottom: 0; padding: 15px; display: flex; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #edf2f7; }
    </style>

    <script>
        const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
                    ? "http://localhost:5000" 
                    : "https://ngo-system-e5af.onrender.com";

        let allBeneficiaries = [];
        let token = localStorage.getItem("ngo_token") || "";
        let myChart;
        let editingId = null;

        /* ------------------ AUTH LOGIC ------------------ */
        async function login() {
            const email = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const msgEl = document.getElementById("msg");
            msgEl.innerText = "⏳ Connecting...";

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    token = data.token;
                    localStorage.setItem("ngo_token", token);
                    showApp();
                } else {
                    msgEl.innerText = "❌ " + (data.message || "Invalid Credentials");
                }
            } catch (err) {
                msgEl.innerText = "⚠️ Server not responding.";
            }
        }

        function showApp() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("protectedArea").classList.remove("hidden");
            loadData(); loadStats(); loadChart();
        }

        function logout() { localStorage.removeItem("ngo_token"); location.reload(); }
        function toggleForm() { 
            document.getElementById("addForm").classList.toggle("hidden");
            if(document.getElementById("addForm").classList.contains("hidden")) resetForm();
        }

        function resetForm() {
            editingId = null;
            document.querySelectorAll("#addForm input, #addForm select, #addForm textarea").forEach(el => el.value = "");
            const actionBtn = document.querySelector("#addForm button");
            actionBtn.innerText = "Save Beneficiary";
            actionBtn.onclick = addBeneficiary;
        }

        /* ------------------ DATA LOADING ------------------ */
        async function loadData() {
            const res = await fetch(`${API}/beneficiaries`, { 
                headers: { "Authorization": `Bearer ${token}` }
            });
            allBeneficiaries = await res.json();
            renderTable(allBeneficiaries);
        }

        function filterData() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allBeneficiaries.filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                item.program.toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        }

        function renderTable(data) {
            document.getElementById("list").innerHTML = data.map(i => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            ${i.photoUrl ? `<img src="${i.photoUrl}" class="profile-img">` : `<div class="profile-img" style="background:#cbd5e0; display:flex; align-items:center; justify-content:center; font-size:10px; color:white;">NO IMG</div>`}
                            <b>${i.name}</b>
                        </div>
                    </td>
                    <td>${i.sex || '-'}</td>
                    <td>${i.age || '-'}</td>
                    <td>${i.phone || '-'}</td>
                    <td><span style="background:#ebf8ff; color:#2b6cb0; padding:4px 10px; border-radius:20px; font-size:12px;">${i.program}</span></td>
                    <td style="text-align:right;">
                        ${i.idCardUrl ? `<a href="${i.idCardUrl}" target="_blank" style="margin-right:10px; font-size:12px; color:var(--success);">View ID</a>` : ''}
                        <button onclick="editItem('${i._id}')" style="color:var(--primary); background:none; margin-right:10px; cursor:pointer;">Edit</button>
                        <button onclick="deleteItem('${i._id}')" style="color:var(--danger); background:none; cursor:pointer;">Delete</button>
                    </td>
                </tr>
            `).join("");
        }

        /* ------------------ CRUD OPERATIONS ------------------ */
        async function addBeneficiary() {
            const formData = new FormData();
            formData.append("name", document.getElementById("name").value);
            formData.append("sex", document.getElementById("sex").value);
            formData.append("age", document.getElementById("age").value);
            formData.append("phone", document.getElementById("phone").value);
            formData.append("address", document.getElementById("address").value);
            formData.append("program", document.getElementById("program").value);
            formData.append("details", document.getElementById("details").value);
            
            const photoFile = document.getElementById("photoInput").files[0];
            const idFile = document.getElementById("idCardInput").files[0];
            if (photoFile) formData.append("photo", photoFile);
            if (idFile) formData.append("idCard", idFile);

            const res = await fetch(`${API}/beneficiaries`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}` },
                body: formData
            });

            if(res.ok) {
                alert("Saved successfully! 📂");
                resetForm(); toggleForm(); loadData(); loadStats(); loadChart();
            } else {
                alert("Error saving data.");
            }
        }

        function editItem(id) {
            const item = allBeneficiaries.find(b => b._id === id);
            if (!item) return;
            editingId = id;
            document.getElementById("name").value = item.name;
            document.getElementById("sex").value = item.sex || "";
            document.getElementById("age").value = item.age || "";
            document.getElementById("phone").value = item.phone || "";
            document.getElementById("address").value = item.address || "";
            document.getElementById("program").value = item.program || "";
            document.getElementById("details").value = item.details || "";

            if (document.getElementById("addForm").classList.contains("hidden")) toggleForm();
            const actionBtn = document.querySelector("#addForm button");
            actionBtn.innerText = "Update Beneficiary Info";
            actionBtn.onclick = saveUpdate; 
        }

        async function saveUpdate() {
    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("sex", document.getElementById("sex").value);
    formData.append("age", document.getElementById("age").value);
    formData.append("phone", document.getElementById("phone").value);
    formData.append("address", document.getElementById("address").value);
    formData.append("program", document.getElementById("program").value);
    formData.append("details", document.getElementById("details").value);
    
    const photoFile = document.getElementById("photoInput").files[0];
    const idFile = document.getElementById("idCardInput").files[0];
    if (photoFile) formData.append("photo", photoFile);
    if (idFile) formData.append("idCard", idFile);

    const res = await fetch(`${API}/beneficiaries/${editingId}`, {
        method: "PUT",
        headers: { "Authorization": `Bearer ${token}` },
        body: formData // Sending FormData instead of JSON
    });

    if (res.ok) {
        alert("Updated successfully! ✅");
        resetForm();
        if (!document.getElementById("addForm").classList.contains("hidden")) toggleForm(); 
        await loadData(); 
        loadStats();
        loadChart();
    } else {
        alert("Update failed. ❌");
    }
}

        async function deleteItem(id) {
            if(!confirm("Are you sure?")) return;
            await fetch(`${API}/beneficiaries/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
            loadData(); loadStats(); loadChart();
        }

        /* ------------------ ANALYTICS ------------------ */
        async function loadStats() {
            const res = await fetch(`${API}/stats`, { headers: { "Authorization": `Bearer ${token}` } });
            const d = await res.json();
            document.getElementById("totalUsers").innerText = d.totalBeneficiaries || 0;
            document.getElementById("totalPrograms").innerText = d.totalPrograms || 0;
        }

        async function loadChart() {
            const res = await fetch(`${API}/program-stats`, { headers: { "Authorization": `Bearer ${token}` } });
            const data = await res.json();
            const ctx = document.getElementById('programChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(x => x._id || "Other"),
                    datasets: [{ label: 'People', data: data.map(x => x.count), backgroundColor: '#3182ce' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        window.onload = () => { if (token) showApp(); };
    </script>
</head>
<body>

    <div id="loginSection" class="box" style="max-width: 400px; margin: 100px auto;">
        <h2 style="text-align: center; margin-top: 0;">NGO Login</h2>
        <input id="username" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-primary" onclick="login()" style="width: 100%;">Enter Command Center</button>
        <p id="msg" style="color:var(--danger); text-align: center; font-size: 14px;"></p>
    </div>

    <div id="protectedArea" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 24px;">🌍 NGO Central Command</h1>
            <button onclick="logout()" style="background: var(--danger); color: white;">🔒 Logout</button>
        </div>

        <div class="analytics-row">
            <div class="stat-card" style="background: var(--primary);">
                <span>Total Beneficiaries</span>
                <h1 id="totalUsers">0</h1>
            </div>
            <div class="chart-box">
                <canvas id="programChart"></canvas>
            </div>
            <div class="stat-card" style="background: var(--success);">
                <span>Active Programs</span>
                <h1 id="totalPrograms">0</h1>
            </div>
        </div>

        <div class="box">
            <div style="display: flex; gap: 10px;">
                <input id="searchInput" oninput="filterData()" placeholder="🔍 Search by name or program..." style="flex: 3; margin: 0;">
                <button class="btn-primary" onclick="toggleForm()" style="flex: 1;">+ Add Beneficiary</button>
            </div>

            <div id="addForm" class="hidden" style="background: #f7fafc; padding: 20px; margin-top: 15px; border-radius: 8px; border: 1px dashed #cbd5e0;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <input id="name" placeholder="Full Name">
                    <select id="sex"><option value="">Sex</option><option>Male</option><option>Female</option></select>
                    <input id="age" type="number" placeholder="Age">
                    <input id="phone" placeholder="Phone">
                    <input id="address" placeholder="Address">
                    <input id="program" placeholder="Program">
                </div>
                <textarea id="details" placeholder="Details"></textarea>
                
                <div style="display: flex; gap: 20px; margin-top: 10px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #edf2f7;">
                    <div style="flex: 1;">
                        <label style="font-size: 11px; font-weight: bold; color: #718096; display: block; margin-bottom: 5px;">PROFILE PHOTO</label>
                        <input type="file" id="photoInput" accept="image/*" style="border: none; padding: 0; margin: 0;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 11px; font-weight: bold; color: #718096; display: block; margin-bottom: 5px;">ID CARD (IMG/PDF)</label>
                        <input type="file" id="idCardInput" accept="image/*,application/pdf" style="border: none; padding: 0; margin: 0;">
                    </div>
                </div>

                <button class="btn-primary" onclick="addBeneficiary()" style="width: 100%; margin-top: 15px;">Save Beneficiary</button>
            </div>
        </div>

        <div class="box" style="padding: 0; overflow: hidden;">
            <table>
                <thead>
                    <tr><th>Name</th><th>Sex</th><th>Age</th><th>Phone</th><th>Program</th><th style="text-align:right;">Action</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
