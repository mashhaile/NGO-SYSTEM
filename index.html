<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Central Command</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3182ce; --success: #38a169; --danger: #e53e3e; --bg: #f0f2f5; }
        .hidden { display: none !important; }
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: var(--bg); color: #1a202c; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select, textarea { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2b6cb0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
        th { background: #edf2f7; padding: 15px; text-align: left; color: #4a5568; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        tr:hover { background-color: #f7fafc; }
        .analytics-row { display: flex; gap: 20px; align-items: stretch; margin-bottom: 25px; height: 200px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 12px; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .chart-box { flex: 2; margin-bottom: 0; padding: 15px; display: flex; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>

    <script>
        const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
                    ? "http://localhost:5000" 
                    : "https://ngo-system-e5af.onrender.com";

        let token = localStorage.getItem("ngo_token") || "";
        let myChart;

        async function login() {
            const email = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const msgEl = document.getElementById("msg");
            msgEl.innerText = "⏳ Connecting...";

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    token = data.token;
                    localStorage.setItem("ngo_token", token);
                    showApp();
                } else {
                    msgEl.innerText = "❌ " + (data.message || "Invalid Credentials");
                }
            } catch (err) {
                msgEl.innerText = "⚠️ Server not responding.";
            }
        }

        function showApp() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("protectedArea").classList.remove("hidden");
            loadData(); loadStats(); loadChart();
        }

        function logout() { localStorage.removeItem("ngo_token"); location.reload(); }
        function toggleForm() { document.getElementById("addForm").classList.toggle("hidden"); }

        async function loadData() {
            const res = await fetch(`${API}/beneficiaries`, { headers: { "Authorization": `Bearer ${token}` } });
            const data = await res.json();
            document.getElementById("list").innerHTML = data.map(i => `
                <tr>
                    <td><b>${i.name}</b></td>
                    <td>${i.sex || '-'}</td>
                    <td>${i.age || '-'}</td>
                    <td>${i.phone || '-'}</td>
                    <td><span style="background:#ebf8ff; color:#2b6cb0; padding:4px 10px; border-radius:20px; font-size:12px;">${i.program}</span></td>
                    <td style="text-align:right;"><button onclick="deleteItem('${i._id}')" style="color:var(--danger); background:none;">Delete</button></td>
                </tr>
            `).join("");
        }

        async function addBeneficiary() {
            const payload = {
                name: document.getElementById("name").value,
                sex: document.getElementById("sex").value,
                age: document.getElementById("age").value,
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value,
                program: document.getElementById("program").value,
                details: document.getElementById("details").value
            };
            const res = await fetch(`${API}/beneficiaries`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                document.querySelectorAll("#addForm input, #addForm select, #addForm textarea").forEach(el => el.value = "");
                toggleForm(); loadData(); loadStats(); loadChart();
            }
        }

        async function loadStats() {
            const res = await fetch(`${API}/stats`, { headers: { "Authorization": `Bearer ${token}` } });
            const d = await res.json();
            document.getElementById("totalUsers").innerText = d.totalBeneficiaries || 0;
            document.getElementById("totalPrograms").innerText = d.totalPrograms || 0;
        }

        async function loadChart() {
            const res = await fetch(`${API}/program-stats`, { headers: { "Authorization": `Bearer ${token}` } });
            const data = await res.json();
            const ctx = document.getElementById('programChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(x => x._id || "Other"),
                    datasets: [{ label: 'People', data: data.map(x => x.count), backgroundColor: '#3182ce' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function deleteItem(id) {
            if(!confirm("Delete?")) return;
            await fetch(`${API}/beneficiaries/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
            loadData(); loadStats(); loadChart();
        }

        window.onload = () => { if (token) showApp(); };
    </script>
</head>
<body>

    <div id="loginSection" class="box" style="max-width: 400px; margin: 100px auto;">
        <h2 style="text-align: center; margin-top: 0;">NGO Login</h2>
        <input id="username" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button class="btn-primary" onclick="login()" style="width: 100%;">Enter Command Center</button>
        <p id="msg" style="color:var(--danger); text-align: center; font-size: 14px;"></p>
    </div>

    <div id="protectedArea" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 24px;">🌍 NGO Central Command</h1>
            <button onclick="logout()" style="background: var(--danger); color: white;">🔒 Logout</button>
        </div>

        <div class="analytics-row">
            <div class="stat-card" style="background: var(--primary);">
                <span>Total Beneficiaries</span>
                <h1 id="totalUsers">0</h1>
            </div>
            <div class="chart-box">
                <canvas id="programChart"></canvas>
            </div>
            <div class="stat-card" style="background: var(--success);">
                <span>Active Programs</span>
                <h1 id="totalPrograms">0</h1>
            </div>
        </div>

        <div class="box">
            <div style="display: flex; gap: 10px;">
                <input id="searchInput" placeholder="🔍 Search..." style="flex: 3; margin: 0;">
                <button class="btn-primary" onclick="toggleForm()" style="flex: 1;">+ Add Beneficiary</button>
            </div>

            <div id="addForm" class="hidden" style="background: #f7fafc; padding: 20px; margin-top: 15px; border-radius: 8px; border: 1px dashed #cbd5e0;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <input id="name" placeholder="Full Name">
                    <select id="sex"><option value="">Sex</option><option>Male</option><option>Female</option></select>
                    <input id="age" type="number" placeholder="Age">
                    <input id="phone" placeholder="Phone">
                    <input id="address" placeholder="Address">
                    <input id="program" placeholder="Program">
                </div>
                <textarea id="details" placeholder="Details"></textarea>
                <button class="btn-primary" onclick="addBeneficiary()" style="width: 100%; margin-top: 10px;">Save Beneficiary</button>
            </div>
        </div>

        <div class="box" style="padding: 0; overflow: hidden;">
            <table>
                <thead>
                    <tr><th>Name</th><th>Sex</th><th>Age</th><th>Phone</th><th>Program</th><th style="text-align:right;">Action</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
